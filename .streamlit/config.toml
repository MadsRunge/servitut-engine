[server]
enableWebsocketCompression = false
maxUploadSize = 200
headless = true
# Keep WebSocket alive for long-running LLM pipeline jobs.
# Streamlit 1.55 uses websocketPingInterval; it also derives ping timeout from this value.
websocketPingInterval = 30
# Keep session state around across transient proxy/websocket reconnects during long jobs.
disconnectedSessionTTL = 900

[browser]
gatherUsageStats = false
